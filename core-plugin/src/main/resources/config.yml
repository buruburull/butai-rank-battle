# BUTAI Rank Battle - Configuration

database:
  host: localhost
  port: 3306
  name: brb
  username: root
  password: ""

# Lobby settings
lobby:
  world: world
  x: 0.0
  y: 64.0
  z: 0.0
  yaw: 0.0
  pitch: 0.0

# NPC settings (Villagers in lobby)
# Each NPC: world, x, y, z, yaw, command, name, subtitle
npcs:
  rank_match:
    world: world
    x: 5.0
    y: 64.0
    z: 0.0
    yaw: 180.0
    name: "§6§lランクマッチ"
    subtitle: "§7右クリックで参加"
    command: "rank solo"
  practice:
    world: world
    x: 3.0
    y: 64.0
    z: 0.0
    yaw: 180.0
    name: "§a§lプラクティス"
    subtitle: "§7右クリックで参加"
    command: "rank practice"
  team_match:
    world: world
    x: 1.0
    y: 64.0
    z: 0.0
    yaw: 180.0
    name: "§d§lチームマッチ"
    subtitle: "§7右クリックで参加"
    command: "rank team"
  frameset:
    world: world
    x: -1.0
    y: 64.0
    z: 0.0
    yaw: 180.0
    name: "§b§lフレームセット"
    subtitle: "§7右クリックで確認"
    command: "frame view"
  stats:
    world: world
    x: -3.0
    y: 64.0
    z: 0.0
    yaw: 180.0
    name: "§e§l戦績"
    subtitle: "§7右クリックで表示"
    command: "rank stats"

# Hologram settings (TextDisplay entities)
holograms:
  welcome:
    world: world
    x: 0.0
    y: 67.0
    z: -5.0
    text: |
      §6§l═══════════════════
      §e§l  BUTAI RANK BATTLE
      §6§l═══════════════════
      §7  フレームを装備して戦え！
  ranking:
    world: world
    x: 0.0
    y: 67.0
    z: 5.0
    update_interval: 600  # ticks (30 seconds)

# Action bar settings
actionbar:
  enabled: true
  update_interval: 40  # ticks (2 seconds)
  format: "§6ランク: {rank} §8| §bRP: §f{rp} §8| §7{status}"
