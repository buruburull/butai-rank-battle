name: BUTAIRankBattle
version: '0.1.0-SNAPSHOT'
main: com.butai.rankbattle.BRBPlugin
api-version: '1.21'
description: Competitive PvP plugin with Frame-based combat system
authors: [buruburull]

commands:
  frame:
    description: Frame management commands
    usage: /frame <set|view|remove|list>
  rank:
    description: Rank match commands
    usage: /rank <solo|team|cancel|stats|top>
  team:
    description: Team management commands
    usage: /team <create|invite|accept|deny|leave|info>
  bradmin:
    description: BRB admin commands
    usage: /bradmin <frame|forcestart|rp|season>
    permission: brb.admin

permissions:
  brb.admin:
    description: BRB administrator permission
    default: op
