name: BorderRankBattle
version: '${version}'
main: com.borderrank.battle.BRBPlugin
api-version: '1.21'
description: World Trigger inspired rank battle system
authors: [BorderRankTeam]
website: https://github.com/your-org/border-rank-battle

commands:
  rank:
    description: ランク戦関連コマンド
    usage: /rank <solo|team|cancel|stats|top>
  trigger:
    description: トリガーセット管理
    usage: /trigger <set|remove|list|view|preset>
  team:
    description: チーム管理
    usage: /team <create|invite|leave|info>
  bradmin:
    description: 管理者コマンド
    permission: brb.admin
    usage: /bradmin <trigger|map|season|rp|forcestart>

permissions:
  brb.admin:
    description: 管理者権限
    default: op
  brb.play:
    description: プレイ権限
    default: true
