      damage_multiplier: 2.5
      draw_speed: 0.7
      arrow_velocity: 1.2
      accuracy: 0.98
      charge_required: true

  lightning:
    display_name: "Lightning"
    cost: 3
    category: "sniper"
    minecraft_item: "BOW"
    base_damage: 6
    piercing_effect: true
    piercing_count: 3
    description: "Bow trigger with piercing arrows. Projectiles pass through multiple enemies."
    attributes:
      damage_multiplier: 1.2
      draw_speed: 0.85
      arrow_velocity: 1.15
      accuracy: 0.92
      piercing_arrows: 3

  ibis:
    display_name: "Ibis"
    cost: 5
    category: "sniper"
    minecraft_item: "BOW"
    base_damage: 8
    enchantment: "POWER_MAX"
    charge_time: 3.0
    description: "Ultimate sniper trigger. Maximum power output with longest charge time."
    attributes:
      damage_multiplier: 3.0
      draw_speed: 0.6
      arrow_velocity: 1.3
      accuracy: 0.99
      charge_required: true

# ============================================
