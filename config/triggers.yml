      visibility_range: 64.0
      cooldown: 6

  star_trigger:
    display_name: "Star Trigger"
    cost: 0
    category: "support"
    minecraft_item: "IRON_INGOT"
    trion_usage: 0
    trion_type: "none"
    cooldown_seconds: 0
    description: "Universal support trigger. No cost, serves as placeholder or emergency option."
    attributes:
      effect: "none"
      cooldown: 0

# ============================================
# TRION SYSTEM CONFIGURATION
# ============================================
trion:
  max_trion: 1000
  leak_coefficient: 2.5
  low_trion_warning: 200
  critical_trion_warning: 100
  bailout_threshold: 0
  natural_regeneration: false
  description: |
    Trion is the energy resource used by all triggers.
    - max_trion: Maximum trion capacity for players
    - leak_coefficient: Rate of trion leakage during match (per minute)
    - low_trion_warning: Player receives warning at this trion level
    - critical_trion_warning: Critical alert threshold
    - bailout_threshold: Minimum trion required to trigger bailout mechanism
    - natural_regeneration: Whether trion regenerates over time (disabled for BRB)

# ============================================
# MATCH CONFIGURATION
# ============================================
match:
  solo:
    time_limit_seconds: 300
    max_teleporters: 15
    starting_trion: 1000
    mode: "solo"
    description: "Solo matches with 5-minute time limit"

  team:
    time_limit_seconds: 600
    max_teleporters: 15
    starting_trion: 1000
    mode: "team"
    description: "Team matches with 10-minute time limit"

  general:
    max_teleporters: 15
    starting_trion: 1000
    trion_leak_enabled: true
    friendly_fire: false
    describe_mode_enabled: true

# ============================================
# LOBBY SETTINGS
# ============================================
# Players teleport here on login and after match end.
# All locations use format: "x,y,z"
# Coordinates can be changed from Pterodactyl file manager.
lobby:
  world: "world"
  location: "0,65,0"
  yaw: 0.0
  pitch: 0.0

  # ---- NPC Settings ----
  # NPCs are villagers with custom names. Right-click to interact.
  # Actions: rank_solo, rank_practice, trigger_view, rank_stats, rank_top
  npcs:
    ranked_match:
      location: "3,65,0"
      yaw: 180.0
      name: "§6§lランクマッチ"
      subtitle: "§7右クリックで参加"
      action: "rank_solo"
    practice_match:
      location: "-3,65,0"
      yaw: 180.0
      name: "§b§l練習マッチ"
      subtitle: "§7右クリックで参加"
      action: "rank_practice"
    loadout:
      location: "0,65,3"
      yaw: 180.0
      name: "§a§lロードアウト"
      subtitle: "§7右クリックで確認"
      action: "trigger_view"
    stats:
      location: "0,65,-3"
      yaw: 0.0
      name: "§d§l戦績確認"
      subtitle: "§7右クリックで表示"
      action: "rank_stats"

  # ---- Hologram Settings ----
  # Floating text displays using TextDisplay entities.
  # type: "static" (fixed text) or "ranking_top10" (auto-updated leaderboard)
  holograms:
    welcome:
      location: "0,68,0"
      lines:
        - "§6§l⚔ Border Rank Battle ⚔"
        - "§7NPCを右クリックして参加しよう"
      type: "static"
    ranking:
      location: "6,67,0"
      lines:
        - "§e§l🏆 ランキング TOP10"
      type: "ranking_top10"

  # ---- Actionbar Settings ----
  # Shows player status while in lobby.
  # Placeholders: {rank}, {rp}, {queue_status}, {wins}, {losses}
  actionbar:
    enabled: true
    format: "§7ランク: {rank} §8| §7RP: {rp} §8| §7{queue_status}"
    update_interval: 40

# ============================================
# MAP DEFINITIONS
# ============================================
# Each map defines spawn points and optional boundaries.
# Spawn points format: "x,y,z"
# At least 2 spawn points required (for solo), 4 recommended (for team).
# Coordinates should be set after building the arenas in-game.
# Use /bradmin map list to check map status.
maps:
  arena_factory:
    display_name: "工場地帯"
    world: "world"
    spawn_points:
      - "100,65,100"
      - "150,65,150"
      - "100,65,150"
      - "150,65,100"
    boundaries:
      corner1: "80,0,80"
      corner2: "170,128,170"

  arena_residential:
    display_name: "住宅街"
    world: "world"
    spawn_points:
      - "300,65,100"
      - "350,65,150"
      - "300,65,150"
      - "350,65,100"
    boundaries:
      corner1: "280,0,80"
      corner2: "370,128,170"
