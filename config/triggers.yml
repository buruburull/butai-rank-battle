# Border Rank Battle - Trigger Definitions
# This file defines all available triggers in the game
# Each trigger has properties that affect gameplay mechanics

# ============================================
# ATTACKER TRIGGERS
# ============================================
attackers:
  kogetsu:
    display_name: "Kogetsu"
    cost: 4
    category: "attacker"
    minecraft_item: "NETHERITE_SWORD"
    base_damage: 8
    description: "High-damage sword trigger. Deals 8 damage per hit with enhanced reach."
    attributes:
      damage_multiplier: 1.0
      attack_speed: 1.0
      knockback: 0.5
      durability: 100

  scorpion:
    display_name: "Scorpion"
    cost: 2
    category: "attacker"
    minecraft_item: "GOLDEN_SWORD"
    base_damage: 5
    backstab_multiplier: 1.5
    description: "Agile sword trigger. Deals increased damage from behind enemies."
    attributes:
      damage_multiplier: 1.0
      attack_speed: 1.2
      backstab_bonus: 1.5
      knockback: 0.3
      durability: 80

  raygust:
    display_name: "Raygust"
    cost: 3
    category: "attacker"
    minecraft_item: "IRON_SWORD"
    base_damage: 6
    shield_mode: true
    description: "Versatile sword trigger with defensive shield capabilities. Can switch between attack and defense modes."
    attributes:
      damage_multiplier: 1.0
      attack_speed: 0.9
      shield_strength: 0.8
      knockback: 0.4
      durability: 90

# ============================================
# SHOOTER TRIGGERS
# ============================================
