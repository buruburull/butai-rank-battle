# Border Rank Battle - Trigger Definitions
# This file defines all available triggers in the game
# Each trigger has properties that affect gameplay mechanics

# ============================================
# ATTACKER TRIGGERS
# ============================================
attackers:
  kogetsu:
    display_name: "Kogetsu"
    cost: 4
    category: "attacker"
    minecraft_item: "NETHERITE_SWORD"
    base_damage: 8
    description: "High-damage sword trigger. Deals 8 damage per hit with enhanced reach."
    attributes:
      damage_multiplier: 1.0
      attack_speed: 1.0
      knockback: 0.5
      durability: 100

  scorpion:
    display_name: "Scorpion"
    cost: 2
    category: "attacker"
    minecraft_item: "GOLDEN_SWORD"
    base_damage: 5
    backstab_multiplier: 1.5
    description: "Agile sword trigger. Deals increased damage from behind enemies."
    attributes:
      damage_multiplier: 1.0
      attack_speed: 1.2
      backstab_bonus: 1.5
      knockback: 0.3
      durability: 80

  raygust:
    display_name: "Raygust"
    cost: 3
    category: "attacker"
    minecraft_item: "IRON_SWORD"
    base_damage: 6
    shield_mode: true
    description: "Versatile sword trigger with defensive shield capabilities. Can switch between attack and defense modes."
    attributes:
      damage_multiplier: 1.0
      attack_speed: 0.9
      shield_strength: 0.8
      knockback: 0.4
      durability: 90

# ============================================
# SHOOTER TRIGGERS
# ============================================
shooters:
  asteroid:
    display_name: "Asteroid"
    cost: 3
    category: "shooter"
    minecraft_item: "BOW"
    base_damage: 4
    description: "Basic bow trigger. Fires standard arrows with reliable accuracy."
    attributes:
      damage_multiplier: 1.0
      draw_speed: 1.0
      arrow_velocity: 1.0
      accuracy: 0.95

  meteora:
    display_name: "Meteora"
    cost: 4
    category: "shooter"
    minecraft_item: "CROSSBOW"
    base_damage: 6
    explosion_effect: true
    explosion_radius: 4.0
    explosion_damage: 5
    description: "Explosive crossbow trigger. Fires bolts that create explosions on impact."
    attributes:
      damage_multiplier: 1.0
      draw_speed: 0.8
      bolt_velocity: 1.1
      accuracy: 0.85

  hound:
    display_name: "Hound"
    cost: 4
    category: "shooter"
    minecraft_item: "TRIDENT"
    base_damage: 5
    homing_effect: true
    homing_range: 20.0
    description: "Magical trident trigger with homing capabilities. Projectiles track targets automatically."
    attributes:
      damage_multiplier: 1.0
      throw_speed: 0.9
      homing_strength: 0.7
      accuracy: 1.0

  viper:
    display_name: "Viper"
    cost: 3
    category: "shooter"
    minecraft_item: "BOW"
    base_damage: 4
    curve_shots: true
    curve_strength: 2.5
    description: "Advanced bow trigger capable of curving shots. Projectiles curve around obstacles."
    attributes:
      damage_multiplier: 1.0
      draw_speed: 0.95
      arrow_velocity: 0.95
      accuracy: 0.80

# ============================================
# SNIPER TRIGGERS
# ============================================
snipers:
  egret:
    display_name: "Egret"
    cost: 4
    category: "sniper"
    minecraft_item: "BOW"
    base_damage: 7
    enchantment: "POWER_V"
    charge_time: 2.0
